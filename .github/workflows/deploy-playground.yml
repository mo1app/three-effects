# Build the playground and deploy to GitHub Pages.
# Repo → Settings → Pages → Build and deployment: Source = GitHub Actions.
# Custom domain (or org/user *.github.io at site root): VITE_BASE must be /.
# If you use only https://<owner>.github.io/<repo>/ (no custom domain), set VITE_BASE to /<repo>/.

name: Deploy playground

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - name: Build playground
        run: npm run build:playground
        env:
          VITE_BASE: /
      - uses: actions/upload-pages-artifact@v3
        with:
          path: playground/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
