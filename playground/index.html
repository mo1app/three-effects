<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>three-effects — playground</title>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body,
      #app {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }
      /* First paint only; main.ts sets the same from PLAYGROUND_SCENE_BACKGROUND */
      html,
      body {
        background: #cccccc;
      }
      body {
        font-family:
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          sans-serif;
      }
      #app canvas {
        display: block;
      }
      #ui {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 10;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="ui"></div>
    <script type="module" src="/main.ts"></script>
  </body>
</html>
